<style>
  :root {
    --bg: #12141a; --card-bg: #1c1f26; --text: #ffffff; --text-sec: #8a8d93; --border: #2d323e; --accent: #25406b;
  }
  /* Theme Definitions */
  [data-theme="Light"] { --bg: #f5f7fa; --card-bg: #ffffff; --text: #1a1a1a; --text-sec: #6c757d; --border: #e1e4e8; --accent: #007bff; }
  [data-theme="Ocean"] { --bg: #0f172a; --card-bg: #1e293b; --text: #f8fafc; --text-sec: #94a3b8; --border: #334155; --accent: #0ea5e9; }
  [data-theme="Nature"] { --bg: #061108; --card-bg: #101f12; --text: #ecfdf5; --text-sec: #6da077; --border: #1a2e1d; --accent: #10b981; }
  [data-theme="Cosmos"] { --bg: #0a0514; --card-bg: #160d2b; --text: #f5f3ff; --text-sec: #a78bfa; --border: #2e1d4d; --accent: #7c3aed; }
  [data-theme="Dessert"] { --bg: #fffbeb; --card-bg: #fef3c7; --text: #451a03; --text-sec: #92400e; --border: #fde68a; --accent: #d97706; }
  [data-theme="Vintage"] { --bg: #f4f1ea; --card-bg: #e8e2d6; --text: #2c2c2c; --text-sec: #7a7369; --border: #d3ccbd; --accent: #8b4513; }
  [data-theme="Cyberpunk"] { --bg: #050505; --card-bg: #0d0d0d; --text: #39ff14; --text-sec: #ff00ff; --border: #39ff14; --accent: #ff00ff; }
  [data-theme="Nord"] { --bg: #2e3440; --card-bg: #3b4252; --text: #eceff4; --text-sec: #88c0d0; --border: #4c566a; --accent: #81a1c1; }
  [data-theme="Matcha"] { --bg: #f0f4f0; --card-bg: #ffffff; --text: #2d3a2d; --text-sec: #7c9473; --border: #e0eadd; --accent: #556b2f; }
  [data-theme="Dracula"] { --bg: #282a36; --card-bg: #44475a; --text: #f8f8f2; --text-sec: #bd93f9; --border: #6272a4; --accent: #ff79c6; }
  [data-theme="Rose Gold"] { --bg: #1a1616; --card-bg: #252121; --text: #ffffff; --text-sec: #e0a9a5; --border: #3d3535; --accent: #c48b87; }

  body { background-color: var(--bg); color: var(--text); font-family: 'Segoe UI', sans-serif; overflow-x: hidden; touch-action: pan-y; transition: all 0.3s ease; }
  .app-container { padding: 15px; padding-bottom: 110px; }
  .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
  
  .view-screen { display: none; }
  .view-screen.active { display: block; }

  .bottom-nav { position: fixed; bottom: 0; width: 100%; background: var(--card-bg); display: flex; justify-content: space-around; padding: 12px 0; border-top: 1px solid var(--border); z-index: 1000; }
  .nav-item { text-align: center; color: var(--text-sec); font-size: 11px; }
  .nav-item.active { color: var(--text); }
  .plus-btn { position: fixed; bottom: 85px; right: 20px; background: var(--accent); width: 56px; height: 56px; border-radius: 16px; display: flex; align-items: center; justify-content: center; z-index: 1001; color: white; }

  .modal-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.6); display: none; z-index: 2000; backdrop-filter: blur(3px); }
  .theme-modal { position: fixed; bottom: -100%; left: 0; width: 100%; background: var(--card-bg); border-radius: 25px 25px 0 0; padding: 25px; z-index: 2001; transition: bottom 0.4s cubic-bezier(0.4, 0, 0.2, 1); max-height: 70vh; overflow-y: auto; border-top: 1px solid var(--border); }
  .modal-overlay.active { display: block; }
  .theme-modal.active { bottom: 0; }
  .theme-option { display: flex; align-items: center; padding: 12px; border-radius: 12px; margin-bottom: 5px; cursor: pointer; }
  .color-dot { width: 24px; height: 24px; border-radius: 50%; margin-right: 15px; border: 1px solid var(--border); }

  .loader-container {
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 3px;
    background-color: rgba(0, 0, 0, 0.2); /* Contrast against the colors */
    z-index: 9999;
    overflow: hidden;
    display: none;
  }

  .loader-bar {
    width: 100%;
    height: 100%;
    /* Google Brand Colors: Blue, Red, Yellow, Green */
    background: linear-gradient(
      90deg, 
      #4285F4 0%, 
      #EA4335 25%, 
      #FBBC05 50%, 
      #34A853 75%, 
      #4285F4 100%
    );
    background-size: 300% 100%; /* Stretched for smoother flow */
    animation: google-flow 2s infinite linear;
    box-shadow: 0 0 5px rgba(66, 133, 244, 0.3);
  }

  @keyframes google-flow {
    0% { background-position: 300% 0; }
    100% { background-position: 0% 0; }
  }

</style>
