<script>
  let allTransactions = [];
  let categoryMap = {};
  let accountMap = {};
  let currentFilterRange = 'All time';
  let activeChips = { types: [], accounts: [], categories: [] };

  function constructTransactionData() {
    const monthMap = {
      Jan: '01', Feb: '02', Mar: '03', Apr: '04', May: '05', Jun: '06',
      Jul: '07', Aug: '08', Sep: '09', Oct: '10', Nov: '11', Dec: '12'
    };

    // .slice(1) removes the ['ID', 'Date', ...] header row
    const formattedTransactions = window.MasterData.transactions.slice(1).map(row => {
      // 1. Format the Date from '30-Sep-2019' to '2019-09-30'
      const [day, month, year] = row[1].split('-');
      const isoDate = `${year}-${monthMap[month]}-${day}`;

      // 2. Return the new structure
      return [
        isoDate,   // New Date
        row[6],    // Notes
        row[2],    // Type
        row[3],    // Amount
        row[4],    // Account
        row[5],     // Category
        row[0]     // ID
      ];
    });

    const formattedCategories = window.MasterData.categories.slice(1).reduce((acc, row) => {
        const [id, name, type, icon] = row;
        acc[id] = { 
            name: name,
            type: type,
            icon: icon
        };
        return acc;
    }, {});

    const formattedAccounts = window.MasterData.accounts.slice(1).reduce((acc, row) => {
        // row[0] is AccountID, row[1] is AccountName
        acc[row[0]] = { 
            name: row[1],
            icon: row[2]
        };
        
        return acc;
    }, {});

    return {
      transactions: formattedTransactions,
      categories: formattedCategories,
      accounts: formattedAccounts
    };
  }

  /** 1. Data Loading */
  function loadTransactions() {
    const timeline = document.getElementById('transactionTimeline');
    timeline.innerHTML = '<div class="text-center mt-5 opacity-50">Loading transactions...</div>';
    showLoader();
    setTimeout(() => {
      hideLoader();
      const data = constructTransactionData();
      console.log("Constructed Transaction Data:", data);
      allTransactions = data.transactions;
      categoryMap = data.categories;
      accountMap = data.accounts;
      applyDateFilter('All time'); // Initial render
      setupFilterUI();
    }, 0);
  }

  /** 2. Date Filtering */
  function applyDateFilter(range) {
    showLoader();
    closeDateFilter();
    currentFilterRange = range;
    document.getElementById('currentDateRange').innerText = range;
    setTimeout(() => {
      runMasterFilter();
      hideLoader();
    }, 0);
  }

  /** 3. Advanced Filtering Logic */
  function setupFilterUI() {
    const accBox = document.getElementById('filterAccounts');
    const catBox = document.getElementById('filterCategories');
    
    accBox.innerHTML = Object.keys(accountMap).map(id => 
      `<div class="chip" onclick="toggleChip(this, 'accounts', '${id}')">${accountMap[id].name}</div>`).join('');
    
    catBox.innerHTML = Object.keys(categoryMap).map(id => 
      `<div class="chip" onclick="toggleChip(this, 'categories', '${id}')">${categoryMap[id].name}</div>`).join('');
  }

  function toggleChip(el, group, val) {
    el.classList.toggle('active');
    const list = activeChips[group];
    const idx = list.indexOf(val);
    if (idx > -1) list.splice(idx, 1);
    else list.push(val);
    
    const count = activeChips.types.length + activeChips.accounts.length + activeChips.categories.length;
    document.getElementById('activeFilterCount').innerText = `${count} filters selected`;
  }

  function runAdvancedFilter() {
    showLoader();
    closeAdvancedFilter();
    setTimeout(() => {
      runMasterFilter();
      hideLoader();
    }, 0);
  }

  function clearAllFilters() {
    activeChips = { types: [], accounts: [], categories: [] };
    document.querySelectorAll('.chip').forEach(c => c.classList.remove('active'));
    document.getElementById('activeFilterCount').innerText = `0 filters selected`;
  }

  /** 4. Master Filter & Render */
  function runMasterFilter() {
    const now = new Date();
    
    let filtered = allTransactions.filter(row => {
      const d = new Date(row[0]);
      
      // Part A: Date Filter
      if (currentFilterRange === 'Today' && d.toDateString() !== now.toDateString()) return false;
      if (currentFilterRange === 'This Month' && (d.getMonth() !== now.getMonth() || d.getFullYear() !== now.getFullYear())) return false;

      // Part B: Chip Filters
      if (activeChips.types.length > 0 && !activeChips.types.includes(row[2])) return false;
      if (activeChips.accounts.length > 0 && !activeChips.accounts.includes(row[4])) return false;
      if (activeChips.categories.length > 0 && !activeChips.categories.includes(row[5])) return false;

      return true;
    });

    renderTimeline(filtered);
  }

  function renderTimeline(data) {
    console.log("Rendering timeline with data:", data);
    const container = document.getElementById('transactionTimeline');
    container.innerHTML = '';

    if (!data.length) {
      container.innerHTML = '<div class="text-center mt-5 opacity-50">No transactions match your filters.</div>';
      return;
    }

    // Grouping by Date
    const groups = data.reduce((acc, row) => {
      // FIX: Instead of new Date(row[0]).toISOString(), 
      // directly handle the date string or use UTC methods
      const rawDate = new Date(row[0]);
      
      // Option A: Use local date parts to avoid the ISO shift
      const d = rawDate.getFullYear() + '-' + 
                String(rawDate.getMonth() + 1).padStart(2, '0') + '-' + 
                String(rawDate.getDate()).padStart(2, '0');

      if (!acc[d]) acc[d] = { items: [], total: 0 };
      acc[d].items.push(row);
      
      // Calculate total
      const amount = parseFloat(row[3]) || 0;
      acc[d].total += (row[2] === 'Income' ? amount : -amount);
      
      return acc;
    }, {});
    
    console.log("Grouped Data:", groups);

    Object.keys(groups).sort((a,b) => new Date(b) - new Date(a)).forEach(dateKey => {
      const group = groups[dateKey];
      const d = new Date(dateKey);
      console.log("Rendering group for date:", dateKey, group, d);
      
      let html = `
        <div class="day-group">
          <div class="day-group-header">
            <div class="d-flex align-items-center">
              <div class="day-number">${d.getDate().toString().padStart(2,'0')}</div>
              <div class="day-meta"><div>${d.toLocaleString('en-US',{month:'long',year:'numeric'})}</div><div>${d.toLocaleString('en-US',{weekday:'long'})}</div></div>
            </div>
            <div class="day-total ${group.total >=0 ? 'amt-income' : 'amt-expense'}">${group.total >=0 ? '+' : ''}${formatINR(group.total)}</div>
          </div>`;

      group.items.forEach(row => {
        const cat = categoryMap[row[5]] || {name:'Unknown', icon:'help'};
        const acc = accountMap[row[4]] || {name:'Unknown'};
        html += `
          <div class="trans-card" onclick='openAddTrans(${JSON.stringify(row)})'>
            <div class="trans-icon-box"><span class="material-icons opacity-50">${cat.icon}</span></div>
            <div class="trans-info">
              <div class="trans-title">${cat.name}</div>
              <div class="trans-sub">
                <span class="material-icons" style="font-size:12px; color:var(--accent)">account_balance_wallet</span>
                <span>${acc.name}</span><span class="mx-1">•</span><span class="text-truncate">${row[1]}</span>
              </div>
            </div>
            <div class="trans-amt-box">
              <div class="amt-val ${row[2] === 'Income' ? 'amt-income' : 'amt-expense'}">${row[2] === 'Income' ? '+' : '-'}${formatINR(row[3])}</div>
            </div>
          </div>`;
      });
      container.innerHTML += html + `</div>`;
    });
  }

  // Modal Handlers
  function openDateFilter() { document.getElementById('dateFilterOverlay').classList.add('active'); document.getElementById('dateFilterSheet').classList.add('active'); }
  function closeDateFilter() { document.getElementById('dateFilterOverlay').classList.remove('active'); document.getElementById('dateFilterSheet').classList.remove('active'); }
  function openAdvancedFilter() { document.getElementById('advFilterOverlay').classList.add('active'); document.getElementById('advFilterSheet').classList.add('active'); }
  function closeAdvancedFilter() { document.getElementById('advFilterOverlay').classList.remove('active'); document.getElementById('advFilterSheet').classList.remove('active'); }
</script>
