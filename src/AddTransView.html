<div id="addTransOverlay" class="modal-overlay" onclick="closeAddTrans()"></div>
<div id="addTransModal" class="full-height-modal">
  <div class="modal-header d-flex align-items-center justify-content-between p-3">
    <div class="d-flex align-items-center">
      <span class="material-icons me-3" onclick="closeAddTrans()" style="cursor:pointer; color: var(--accent);">close</span>
      <h5 class="m-0 fw-bold">New Transaction</h5>
    </div>
    <span id="atDeleteBtn" class="material-icons text-danger" style="display:none; cursor:pointer" onclick="deleteCurrentTransaction()">delete</span>
  </div>

  <div class="modal-body p-3">
    <label class="small opacity-50 fw-bold text-uppercase mb-2 d-block">Transaction Type</label>
    <div class="type-switcher-group mb-4">
      <div id="btnTypeExp" class="type-pill active" data-type="Expense" onclick="setTransType('Expense')">
        <span class="material-icons">north_east</span> Expense
      </div>
      <div id="btnTypeInc" class="type-pill" data-type="Income" onclick="setTransType('Income')">
        <span class="material-icons">south_west</span> Income
      </div>
    </div>

    <div class="input-card mb-3">
      <small class="card-label">Amount</small>
      <div class="d-flex align-items-center mt-1">
        <input type="number" id="atAmount" class="invisible-input flex-grow-1" placeholder="0.00" step="0.01">
        <span class="material-icons opacity-50">calculate</span>
      </div>

      <div class="divider my-3"></div>

      <div class="row">
        <div class="col-6 border-end border-secondary border-opacity-25">
          <small class="card-label">Date</small>
          <input type="date" id="atDate" class="invisible-input small-text mt-1">
        </div>
        <div class="col-6 ps-3">
          <small class="card-label">Time</small>
          <input type="time" id="atTime" class="invisible-input small-text mt-1">
        </div>
      </div>

      <div class="divider my-3"></div>

      <small class="card-label">Notes</small>
      <div class="d-flex align-items-center mt-1">
        <span class="material-icons opacity-25 me-2" style="font-size:18px">edit_note</span>
        <input type="text" id="atNotes" class="invisible-input small-text" placeholder="Add a description...">
      </div>
    </div>

    <label class="small opacity-50 fw-bold text-uppercase mb-2 d-block">Details</label>

    <!-- Category Trigger -->
    <div class="at-selector-trigger" onclick="openAtCatPicker()">
      <div class="trigger-icon-circle" id="atCatIconWrap">
        <span class="material-icons" id="atCatIcon">category</span>
      </div>
      <div class="trigger-texts">
        <div class="trigger-label">Category</div>
        <div class="trigger-value" id="atCatLabel">Select category</div>
      </div>
      <span class="material-icons chevron">expand_more</span>
    </div>

    <!-- Account Trigger -->
    <div class="at-selector-trigger" onclick="openAtAccPicker()">
      <div class="trigger-icon-circle" id="atAccIconWrap" style="background:#6366f1;">
        <span class="material-icons" id="atAccIcon">account_balance_wallet</span>
      </div>
      <div class="trigger-texts">
        <div class="trigger-label">Account</div>
        <div class="trigger-value" id="atAccLabel">Select account</div>
      </div>
      <span class="material-icons chevron">expand_more</span>
    </div>

    <!-- Hidden inputs to store selected IDs -->
    <input type="hidden" id="atCategory">
    <input type="hidden" id="atAccount">

    <button class="btn btn-save w-100 p-3 mt-2" onclick="submitNewTransaction()">
      <span class="material-icons me-2">check_circle</span> Save Transaction
    </button>
  </div>
</div>

<!-- Category Picker Bottom Sheet -->
<div id="atCatPickerOverlay" class="modal-overlay" onclick="closeAtCatPicker()"></div>
<div id="atCatPickerSheet" class="theme-modal">
  <div class="modal-handle"></div>
  <div class="d-flex justify-content-between align-items-center mb-4 px-1">
    <h5 class="fw-bold m-0">Select Category</h5>
    <small id="atCatPickerType" class="fw-bold text-uppercase px-2 py-1 rounded-pill"
           style="font-size:10px; letter-spacing:1px;"></small>
  </div>
  <div id="atCatOptionsList"></div>
</div>

<!-- Account Picker Bottom Sheet -->
<div id="atAccPickerOverlay" class="modal-overlay" onclick="closeAtAccPicker()"></div>
<div id="atAccPickerSheet" class="theme-modal">
  <div class="modal-handle"></div>
  <h5 class="fw-bold mb-4 px-1">Select Account</h5>
  <div id="atAccOptionsList"></div>
</div>
