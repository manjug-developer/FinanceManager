<div id="homeView" class="view-screen active">
  <div class="header">
    <h2 class="m-0 fw-bold">Home</h2>
    <span class="material-icons text-secondary" onclick="showView('settings')">settings</span>
  </div>
  
  <div class="fin-card">
    <div class="summary-box">
      <div class="sum-item income-bg"><small>Income</small><h4 class="mb-0 fw-bold" id="incomeText">₹0</h4></div>
      <div class="sum-item expense-bg"><small>Expense</small><h4 class="mb-0 fw-bold" id="expenseText">₹0</h4></div>
    </div>
    <div class="p-3 d-flex justify-content-between" style="background: var(--bg); border-radius:12px;">
      <span class="small" style="color: var(--text-sec)">Total Balance</span>
      <span class="fw-bold" id="totalText">₹0</span>
    </div>
  </div>

  <div class="d-flex justify-content-between align-items-center mb-2 mt-3">
  <label class="small fw-bold m-0" style="color: var(--text-sec)">ACCOUNT</label>
  <button class="btn btn-sm py-0 px-2 d-flex align-items-center" 
          onclick="openAccModal()" 
          style="font-size: 11px; font-weight: 700; color: #3b82f6; background: rgba(59, 130, 246, 0.1); border:none; border-radius: 4px;">
    <span class="material-icons me-1" style="font-size: 14px;">add_circle</span> MANAGE
  </button>
  </div>
  <div class="scroll-wrapper mb-3" id="accountList"></div>

  <label class="small fw-bold mt-3 mb-2" style="color: var(--text-sec)">CATEGORIES (EXPENSES)</label>
  <div class="fin-card">
    <div class="chart-box"><canvas id="expenseChart"></canvas></div>
    <div id="categoryList" class="small"></div>
  </div>

  <label class="small fw-bold mt-3 mb-2" style="color: var(--text-sec)">CATEGORIES (INCOME)</label>
  <div class="fin-card">
    <div class="chart-box"><canvas id="incomeChart"></canvas></div>
    <div id="incomeCategoryList" class="small"></div>
  </div>
</div>
