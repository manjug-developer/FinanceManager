<div id="transactionView" class="view-screen txn-full-bleed">

  <div class="txn-top-bar px-3 pt-3 pb-2">
    <div class="txn-top-left">
      <h2 class="m-0 fw-bold">Transactions</h2>
      <div id="txnFilterBadge" class="txn-filter-badge" style="display:none"></div>
    </div>
    <div class="txn-top-actions">
      <button class="txn-action-btn" onclick="collapseAll()" title="Collapse all">
        <span class="material-icons">unfold_less</span>
      </button>
      <button class="txn-action-btn" onclick="openAdvancedFilter()" title="Filter">
        <span class="material-icons">filter_list</span>
        <span id="txnFilterDot" class="txn-filter-dot" style="display:none"></span>
      </button>
    </div>
  </div>

  <div id="transactionTimeline" class="px-3 pb-5 mt-1"></div>
</div>

<!-- Advanced Filter Sheet -->
<div id="advFilterOverlay" class="modal-overlay" onclick="closeAdvancedFilter()"></div>
<div id="advFilterSheet" class="theme-modal">
  <div class="modal-handle"></div>
  <div class="d-flex justify-content-between align-items-center mb-4 px-2">
    <h5 class="fw-bold m-0">Filter Transactions</h5>
    <span class="text-primary small fw-bold" onclick="clearAllFilters()" style="cursor:pointer">Clear All</span>
  </div>

  <div class="mb-4">
    <label class="small opacity-50 fw-bold text-uppercase mb-2 d-block">Type</label>
    <div class="d-flex flex-wrap gap-2" id="filterTypes">
      <div class="chip" onclick="toggleChip(this, 'types', 'Income')">Income</div>
      <div class="chip" onclick="toggleChip(this, 'types', 'Expense')">Expense</div>
    </div>
  </div>

  <div class="mb-4">
    <label class="small opacity-50 fw-bold text-uppercase mb-2 d-block">Account</label>
    <div class="d-flex flex-wrap gap-2" id="filterAccounts"></div>
  </div>

  <div class="mb-4">
    <label class="small opacity-50 fw-bold text-uppercase mb-2 d-block">Category</label>
    <div class="d-flex flex-wrap gap-2" id="filterCategories"></div>
  </div>

  <div class="pt-3 border-top d-flex justify-content-between align-items-center" style="border-color: var(--border) !important;">
    <span id="activeFilterCount" class="small opacity-50">0 filters selected</span>
    <button class="btn btn-primary px-4 rounded-pill" onclick="runAdvancedFilter()">Apply Filters</button>
  </div>
</div>
