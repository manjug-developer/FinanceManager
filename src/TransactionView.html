<div id="transactionView" class="view-screen">
  <div class="header px-3 pt-3">
    <h2 class="m-0 fw-bold">Transaction</h2>
  </div>

  <div class="d-flex align-items-center justify-content-between px-3 py-2 border-bottom" style="border-color: var(--border) !important;">
    <span class="material-icons opacity-50" style="cursor:pointer">chevron_left</span>
    <div class="d-flex align-items-center" onclick="openDateFilter()" style="cursor:pointer">
      <span class="material-icons me-2" style="font-size:18px; color: var(--accent)">calendar_today</span>
      <span id="currentDateRange" class="fw-bold" style="font-size: 14px;">All time</span>
      <span class="material-icons ms-1" style="font-size:18px">arrow_drop_down</span>
    </div>
    <div class="d-flex align-items-center">
      <span class="material-icons opacity-50 me-3" style="cursor:pointer">chevron_right</span>
      <span class="material-icons" onclick="openAdvancedFilter()" style="cursor:pointer">filter_list</span>
    </div>
  </div>

  <div id="transactionTimeline" class="px-3 pb-5"></div>
</div>

<div id="dateFilterOverlay" class="modal-overlay" onclick="closeDateFilter()"></div>
<div id="dateFilterSheet" class="theme-modal">
  <div class="modal-handle"></div>
  <h5 class="fw-bold mb-4 px-2">Filter By Date</h5>
  <div class="filter-option" onclick="applyDateFilter('Today')">
    <div class="settings-icon-wrapper"><span class="material-icons">today</span></div>
    <div class="flex-grow-1">Today</div>
  </div>
  <div class="filter-option" onclick="applyDateFilter('This Month')">
    <div class="settings-icon-wrapper"><span class="material-icons">calendar_view_month</span></div>
    <div class="flex-grow-1">This Month</div>
  </div>
  <div class="filter-option active" onclick="applyDateFilter('All time')">
    <div class="settings-icon-wrapper"><span class="material-icons">all_inclusive</span></div>
    <div class="flex-grow-1">All time</div>
  </div>
</div>

<div id="advFilterOverlay" class="modal-overlay" onclick="closeAdvancedFilter()"></div>
<div id="advFilterSheet" class="theme-modal">
  <div class="modal-handle"></div>
  <div class="d-flex justify-content-between align-items-center mb-4 px-2">
    <h5 class="fw-bold m-0">Filters</h5>
    <span class="text-primary small fw-bold" onclick="clearAllFilters()" style="cursor:pointer">Clear All</span>
  </div>

  <div class="mb-4">
    <label class="small opacity-50 fw-bold text-uppercase mb-2 d-block">Type</label>
    <div class="d-flex flex-wrap gap-2" id="filterTypes">
      <div class="chip" onclick="toggleChip(this, 'types', 'Income')">Income</div>
      <div class="chip" onclick="toggleChip(this, 'types', 'Expense')">Expense</div>
    </div>
  </div>

  <div class="mb-4">
    <label class="small opacity-50 fw-bold text-uppercase mb-2 d-block">Account</label>
    <div class="d-flex flex-wrap gap-2" id="filterAccounts"></div>
  </div>

  <div class="mb-4">
    <label class="small opacity-50 fw-bold text-uppercase mb-2 d-block">Category</label>
    <div class="d-flex flex-wrap gap-2" id="filterCategories"></div>
  </div>

  <div class="pt-3 border-top d-flex justify-content-between align-items-center" style="border-color: var(--border) !important;">
    <span id="activeFilterCount" class="small opacity-50">0 filters selected</span>
    <button class="btn btn-primary px-4 rounded-pill" onclick="runAdvancedFilter()">Apply Filters</button>
  </div>
</div>
