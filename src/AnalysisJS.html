<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script>
  let analysisBarChartInstance = null;

  function loadAnalysis() {
    // Only proceed if we are actually looking at the analysis view
    if (document.getElementById('analysisView').style.display === 'none') return;
    if (typeof allTransactions === 'undefined') {
      showLoader();
      // google.script.run.withSuccessHandler(data => {
      //   allTransactions = data.transactions;
      //   accountMap = data.accounts;
      //   renderAnalysisBarChart();
      //   hideLoader();
      // }).getTransactionData();
      setTimeout(() => {
        const data = constructTransactionData();
        allTransactions = data.transactions;
        accountMap = data.accounts;
        renderAnalysisBarChart();
        hideLoader();
      }, 0);
    } else {
      renderAnalysisBarChart();
    }
  }

  function renderAnalysisBarChart() {
    const canvas = document.getElementById('analysisBarChartCanvas');
    if (!canvas) return;
    const ctx = canvas.getContext('2d');

    // Destroy previous instance to prevent memory leaks and "ghosting"
    if (analysisBarChartInstance) {
      analysisBarChartInstance.destroy();
    }

    // Process data...
    const stats = {};
    allTransactions.forEach(t => {
      const accId = t[4];
      if (!stats[accId]) stats[accId] = { inc: 0, exp: 0 };
      if (t[2] === 'Income') stats[accId].inc += parseFloat(t[3]);
      else stats[accId].exp += parseFloat(t[3]);
    });

    // Create the chart with responsive: true but maintainAspectRatio: false
    analysisBarChartInstance = new Chart(ctx, {
      type: 'bar',
      data: {
        labels: Object.keys(stats).map(id => accountMap[id]?.name || 'Acc'),
        datasets: [
          { label: 'In', data: Object.values(stats).map(s => s.inc), backgroundColor: '#28a745' },
          { label: 'Out', data: Object.values(stats).map(s => s.exp), backgroundColor: '#ff5252' }
        ]
      },
      options: {
        responsive: true,
        maintainAspectRatio: false, // Prevents canvas from affecting other view layouts
        plugins: { legend: { display: true, position: 'bottom' } }
      }
    });
  }
</script>
