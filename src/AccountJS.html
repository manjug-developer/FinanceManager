<script>
  console.log(currentHomeData.accounts);
  let currentAccId = '';

  function openAccModal(id = null) {
    if (id) {
      showAccForm(id);
    } else {
      renderManageList();
      showAccList();
    }
    document.getElementById('accModalOverlay').classList.add('active');
    document.getElementById('accModal').classList.add('active');
  }

  function showAccList() {
    document.getElementById('accListView').style.display = 'block';
    document.getElementById('accFormView').style.display = 'none';
    document.getElementById('accModalTitle').innerText = 'Manage Accounts';
    document.getElementById('accBackBtn').innerText = 'close';
    document.getElementById('accDeleteBtn').style.display = 'none';
  }

  function showAccForm(id = null) {
    console.log("Opening account form for ID:", id);
    //currentAccId = id;
    document.getElementById('accListView').style.display = 'none';
    document.getElementById('accFormView').style.display = 'block';
    document.getElementById('accBackBtn').innerText = 'arrow_back';
    
    initAccIcons();

    // Finding account in the MasterData array
    const acc = currentHomeData.accounts.find(a => a.id === id);
    
    if (id && acc) {
      document.getElementById('accFormView')._storedValue = acc.id; // Store the account data for later use (e.g., in save/delete)
      document.getElementById('accModalTitle').innerText = 'Edit Account';
      document.getElementById('accDeleteBtn').style.display = 'block';
      document.getElementById('accName').value = acc.name;
      document.getElementById('accIcon').value = acc.icon || 'account_balance';
    } else {
      document.getElementById('accModalTitle').innerText = 'New Account';
      document.getElementById('accDeleteBtn').style.display = 'none';
      document.getElementById('accName').value = '';
    }
    updateIconSelection();
  }

  function handleAccBack() {
    if (document.getElementById('accFormView').style.display === 'block') {
      showAccList();
      renderManageList();
    } else {
      closeAccModal();
    }
  }

  function renderManageList() {
    const container = document.getElementById('manageAccList');
    let html = '';
    console.log("Rendering account list with MasterData:", currentHomeData.accounts);
    currentHomeData.accounts.forEach(acc => {
      html += `
        <div class="manage-acc-item" onclick="showAccForm('${acc.id}')">
          <div class="acc-icon-circle">
            <span class="material-icons">${acc.icon || 'account_balance'}</span>
          </div>
          <div class="flex-grow-1">
            <div class="fw-bold text-white">${acc.name}</div>
            <div class="small opacity-50">₹${parseFloat(acc.balance).toLocaleString('en-IN')}</div>
          </div>
          <span class="material-icons opacity-25">chevron_right</span>
        </div>`;
    });
    container.innerHTML = html || '<div class="text-center opacity-50 my-4">No accounts found</div>';
  }

  function initAccIcons() {
    // 1. Define the missing icons array
    const accIcons = [
      'account_balance',    // Bank/Institution
      'credit_card',        // Credit Card
      'account_balance_wallet', // Wallet/Cash
      'savings',            // Savings account
      'payments',           // General payments
      'paid',               // Income/Profit
      'currency_exchange',  // Forex/Transfer
      'monetization_on',    // Coins/Cash
      'storefront',         // Business Account
      'work',               // Salary/Payroll account
      'smartphone',         // Digital Wallet/UPI
      'trending_up',        // Investment account
      'receipt_long',       // Bills/Expense account
      'shield',             // Insurance
      'diamond'             // High-value/Luxury
    ];
    const container = document.getElementById('accIconList');
    container.innerHTML = accIcons.map(icon => `
      <div class="icon-option" data-icon="${icon}" onclick="selectAccIcon('${icon}', this)">
        <span class="material-icons">${icon}</span>
      </div>
    `).join('');
  }

  function updateIconSelection() {
    const current = document.getElementById('accIcon').value;
    document.querySelectorAll('.icon-option').forEach(opt => {
      opt.classList.toggle('selected', opt.getAttribute('data-icon') === current);
    });
  }

  function selectAccIcon(icon, el) {
    document.getElementById('accIcon').value = icon;
    updateIconSelection();
  }

  function closeAccModal() {
    document.getElementById('accModalOverlay').classList.remove('active');
    document.getElementById('accModal').classList.remove('active');
  }

  function processAccSave() {
    showLoader();
    const data = {
      name: document.getElementById('accName').value,
      icon: document.getElementById('accIcon').value
    };
    if (!data.name) return alert("Enter account name");
    const accModalTitle = document.getElementById('accModalTitle').innerText;
    console.log("Account Modal value ", accModalTitle);
    if(accModalTitle === 'New Account') {
      console.log("Adding new account with data:", [data.name,data.icon]);
      google.script.run.withSuccessHandler(() => {
        showAccList();
        renderManageList();
        hideLoader();
      }).addGenericRow('Accounts', [data.name,data.icon]);
    } else if(accModalTitle === 'Edit Account') {
        const accID = document.getElementById('accFormView')._storedValue;
        console.log("Updating existing account with data:", [accID, data.name,data.icon]);
        google.script.run.withSuccessHandler(() => {
          showAccList();
          renderManageList();
          hideLoader();
        }).updateGenericRow('Accounts',accID, [data.name,data.icon]);
      }
  }

  function processAccDelete() {
    showLoader();
    if (!confirm("Delete this account?")) return;
    const accID = document.getElementById('accFormView')._storedValue;
    google.script.run.withSuccessHandler(() => {
      showAccList();
      renderManageList();
      hideLoader();
    }).deleteGenericRow('Accounts',accID);
  }
</script>
